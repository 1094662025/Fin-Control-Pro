<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="path/to/font-awesome/css/fontawesome.min.css">

    <title>Login</title>

</head>

<body>
    <div class="login">
        <div class="form-container">
            <img src="../img/favicon2removebg.png" alt="logo" class="logo">

            <form action="/" class="form">
                <label for="email" class="label"><i class="fa-solid fa-user"></i>user</label>
                <input type="email" id="email" name="email" class="input input-email"
                    placeholder="your.email@example.com" required>
                <label for="password" class="label"><i class="fa-solid fa-lock"></i>Password</label>
                <input type="password" id="password" name="password" class="input input-password" placeholder="********"
                    required>
                <input type="submit" value="Log In  " class="primary-button login-button">
                <a href="/">Forgot my password?</a>

                <button class="secondary-button signup-button">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/6c2790ee75.js" crossorigin="anonymous"></script>
</body>

</html>
